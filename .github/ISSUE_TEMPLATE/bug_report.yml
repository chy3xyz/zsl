---
name: "🐛 Bug Report"
description: Report a bug in zsl
title: "(short issue description)"
labels: [bug]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: |
        Provide a self-contained code snippet or a link to a minimal repository that reproduces the issue.
        Include exact commands run, e.g. `zig build test --summary all` or `zig run examples/matrix_ops.zig`.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: |
        What actually happened? Include full error messages, stack traces, and relevant logs.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        OS and version, Zig version (`zig version`), and any relevant system libraries.
        Example: macOS 14.5, zig 0.17.0-dev.813+2153f8143.
    validations:
      required: true
