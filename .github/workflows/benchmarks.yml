name: ZSL Performance Benchmarks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

  schedule:
    - cron: '0 2 * * 1'

jobs:
  run-benchmarks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zsl
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.17.0-dev.813+2153f8143

      - name: Run benchmarks
        run: zig build benchmark

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs
          path: |
            zig-out/benchmark*
            *.log
          retention-days: 30
