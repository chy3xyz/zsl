---
name: "🚀 Feature Request"
description: Suggest an idea for zsl
title: "(short feature description)"
labels: [feature-request]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear and concise description of the feature you are proposing.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: |
        Why is this feature useful? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: |
        Describe how you think the feature should work. Include API sketches, examples, or references if possible.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Any alternative solutions or workarounds you have considered.
    validations:
      required: false
